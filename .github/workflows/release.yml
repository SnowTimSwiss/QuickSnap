name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            packages: true
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            packages: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            packages: true
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install musl-tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - uses: taiki-e/install-action@v2
        if: matrix.packages
        with:
          tool: cargo-deb,cargo-generate-rpm

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Create tarball
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/quicksnap dist/
          tar -C dist -czf quicksnap-${{ matrix.target }}.tar.gz quicksnap

      - name: Build .deb / .rpm
        if: matrix.packages
        run: |
          cargo deb --no-build --target ${{ matrix.target }}
          cargo generate-rpm --target ${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: quicksnap-${{ matrix.target }}
          path: |
            quicksnap-${{ matrix.target }}.tar.gz
            target/${{ matrix.target }}/debian/*.deb
            target/${{ matrix.target }}/generate-rpm/*.rpm
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**
          generate_release_notes: true
